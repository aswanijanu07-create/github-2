    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Deploy to staging
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "Deploying to staging..."
          # your deploy command here

  deploy-production:
